<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าจอแสดงคิว</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0d14; --surface:#131720; --surface2:#1a1f2e;
    --border:#232840; --accent:#2d6ef0; --gold:#c9a84c;
    --text:#e8ecf4; --text-dim:#8892aa; --text-muted:#404860;
    --green:#22c55e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);
    height:100vh;overflow:hidden;display:flex;flex-direction:column;}

  /* TOP STATUS BAR */
  .topbar{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:0 32px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  }
  .topbar-logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;letter-spacing:0.3px;}
  .logo-icon{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .topbar-right{display:flex;align-items:center;gap:20px;}
  .clock-big{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--text-dim);letter-spacing:2px;}
  .conn-pill{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--text-muted);}
  .conn-dot.online{background:var(--green);box-shadow:0 0 8px rgba(34,197,94,0.6);animation:pulse-green 2s infinite;}
  @keyframes pulse-green{0%,100%{box-shadow:0 0 8px rgba(34,197,94,0.6);}50%{box-shadow:0 0 16px rgba(34,197,94,0.9);}}
  .conn-text{font-size:12px;color:var(--text-dim);font-weight:600;}

  /* MAIN DISPLAY */
  .main{flex:1;display:flex;gap:0;overflow:hidden;}

  /* LEFT — CURRENT CALLING */
  .calling-panel{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px;position:relative;overflow:hidden;
    border-right:1px solid var(--border);
  }
  .calling-panel::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 45%,rgba(45,110,240,0.1) 0%,transparent 65%);
    pointer-events:none;
  }
  .calling-panel.flash{animation:flash-bg 0.4s ease;}
  @keyframes flash-bg{0%{background:rgba(45,110,240,0.18);}100%{background:transparent;}}

  .calling-tag{
    font-size:13px;font-weight:700;letter-spacing:5px;text-transform:uppercase;
    color:var(--text-muted);margin-bottom:20px;
  }
  .calling-tag.active{color:var(--accent);}

  .calling-num{
    font-family:'IBM Plex Mono',monospace;
    font-size:clamp(56px,10vw,110px);font-weight:700;
    color:var(--text-muted);margin-bottom:4px;line-height:1;
  }
  .calling-num.active{color:var(--accent);}

  .plate-wrap{
    display:flex;align-items:center;gap:8px;margin:16px 0 20px;flex-wrap:wrap;justify-content:center;
  }
  .pc{
    font-family:'IBM Plex Mono',monospace;
    font-size:clamp(44px,8vw,84px);font-weight:700;
    width:clamp(52px,8vw,90px);height:clamp(64px,10vw,108px);
    display:flex;align-items:center;justify-content:center;
    background:var(--surface);border:2px solid var(--border);border-radius:10px;
    color:var(--text-muted);transition:all 0.3s;
  }
  .pc.lit-l{color:var(--text);border-color:#3a4460;}
  .pc.lit-n{color:var(--gold);border-color:#4a3a20;}
  .pc.cur{transform:scale(1.1);box-shadow:0 0 0 3px var(--accent),0 0 32px rgba(45,110,240,0.4);border-color:var(--accent);}
  .pc.cur.l{color:#fff;}
  .pc.cur.n{color:#ffe084;}

  .plate-sep-big{
    font-family:'IBM Plex Mono',monospace;
    font-size:clamp(40px,7vw,76px);color:var(--text-muted);padding:0 6px;
  }

  .zone-tag{
    font-size:clamp(18px,3vw,28px);font-weight:700;
    padding:10px 32px;border-radius:8px;
    background:var(--surface);border:1px solid var(--border);
    color:var(--text-dim);margin-bottom:10px;
  }
  .zone-tag.active{background:rgba(45,110,240,0.12);border-color:var(--accent);color:var(--accent);}
  .province-tag{font-size:16px;color:var(--text-muted);font-weight:500;}

  .idle-state{text-align:center;color:var(--text-muted);}
  .idle-icon{font-size:72px;opacity:0.2;margin-bottom:16px;}
  .idle-text{font-size:18px;font-weight:500;}

  /* RIGHT — QUEUE LIST */
  .queue-panel{width:320px;background:var(--surface);display:flex;flex-direction:column;flex-shrink:0;}
  .qp-header{padding:16px 20px;border-bottom:1px solid var(--border);}
  .qp-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);}
  .qp-list{flex:1;overflow-y:auto;padding:10px;}
  .qp-list::-webkit-scrollbar{width:3px;}
  .qp-list::-webkit-scrollbar-thumb{background:var(--border);}
  .qp-item{
    display:flex;align-items:center;gap:10px;
    background:var(--bg);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;margin-bottom:6px;
  }
  .qp-item.active{border-color:var(--accent);background:rgba(45,110,240,0.08);}
  .qp-num{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--text-muted);min-width:32px;}
  .qp-item.active .qp-num{color:var(--accent);}
  .qp-plate{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;letter-spacing:1.5px;flex:1;}
  .qp-plate .l{color:var(--text);}
  .qp-plate .n{color:var(--gold);}
  .qp-zone{font-size:11px;color:var(--text-muted);background:var(--surface2);border-radius:4px;padding:2px 7px;white-space:nowrap;}

  /* UNLOCK OVERLAY */
  .unlock-overlay{
    position:fixed;inset:0;background:rgba(10,13,20,0.97);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    z-index:999;gap:20px;cursor:pointer;
  }
  .unlock-overlay.hidden{display:none;}
  .unlock-icon{font-size:72px;}
  .unlock-text{font-size:22px;font-weight:600;color:var(--text-dim);}
  .unlock-sub{font-size:14px;color:var(--text-muted);}
  .unlock-btn{
    margin-top:12px;background:var(--accent);color:#fff;border:none;
    border-radius:10px;padding:14px 40px;font-size:18px;font-weight:700;
    font-family:'Sarabun',sans-serif;cursor:pointer;
  }
</style>
</head>
<body>

<!-- Must click to unlock audio -->
<div class="unlock-overlay" id="unlock-overlay" onclick="unlockAndStart()">
  <div class="unlock-icon">🔔</div>
  <div class="unlock-text">หน้าจอแสดงคิวรับรถ</div>
  <div class="unlock-sub">แตะหน้าจอเพื่อเริ่มรับสัญญาณ</div>
  <button class="unlock-btn">▶ เริ่มใช้งาน</button>
</div>

<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-icon">📺</div>
    ระบบแสดงคิวรับรถ
  </div>
  <div class="topbar-right">
    <div class="conn-pill">
      <div class="conn-dot" id="conn-dot"></div>
      <span class="conn-text" id="conn-text">กำลังเชื่อมต่อ...</span>
    </div>
    <div class="clock-big" id="clock">--:--:--</div>
  </div>
</div>

<div class="main">
  <!-- CALLING PANEL -->
  <div class="calling-panel" id="calling-panel">
    <div class="idle-state">
      <div class="idle-icon">🚗</div>
      <div class="idle-text">รอการเรียกคิว...</div>
    </div>
  </div>

  <!-- QUEUE LIST PANEL -->
  <div class="queue-panel">
    <div class="qp-header">
      <div class="qp-title">คิวรอเรียก</div>
    </div>
    <div class="qp-list" id="qp-list">
      <div style="text-align:center;padding:40px 0;font-size:13px;color:var(--text-muted)">ไม่มีคิว</div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCFc9wLwD0J9_GcXnJ2xzAVMjnPhVJmwqM",
  authDomain: "create-98245.firebaseapp.com",
  databaseURL: "https://create-98245-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "create-98245",
  storageBucket: "create-98245.firebasestorage.app",
  messagingSenderId: "490139130684",
  appId: "1:490139130684:web:a69bfbcb7e61dda952dc39"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// Connection status
onValue(ref(db, '.info/connected'), snap => {
  const online = snap.val() === true;
  document.getElementById('conn-dot').className  = 'conn-dot' + (online ? ' online' : '');
  document.getElementById('conn-text').textContent = online ? 'เชื่อมต่อแล้ว' : 'กำลังเชื่อมต่อ...';
});

// Listen to queue state
let lastCallingId = null;
onValue(ref(db, 'queue_system'), snap => {
  const data = snap.val();
  if (!data) return;
  const { queues = [], calling = null } = data;

  // Render queue list panel
  window._renderQueuePanel(queues, calling);

  // Detect new calling event
  if (calling && calling !== lastCallingId) {
    const q = queues.find(x => x.id === calling);
    if (q && window._audioReady) {
      window._triggerCall(q);
    }
    lastCallingId = calling;
  } else if (calling === null) {
    lastCallingId = null;
  }

  // If currently calling, update display
  if (calling) {
    const q = queues.find(x => x.id === calling);
    if (q) window._showCallingStatic(q);
  } else {
    window._showIdle();
  }
});
</script>

<script>
// ── Audio unlock ──
let audioCtx = null, audioReady = false;
window._audioReady = false;

function unlockAndStart() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioReady = true;
    window._audioReady = true;
  } catch(e) {}
  document.getElementById('unlock-overlay').classList.add('hidden');
}

// ── Clock ──
function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('th-TH',{hour12:false}); }
setInterval(updateClock, 1000); updateClock();

// ── Chime ──
function playChime(onDone) {
  if (!audioCtx) { onDone&&onDone(); return; }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const notes = [{freq:880,start:0.0,dur:0.35},{freq:660,start:0.4,dur:0.35},{freq:880,start:0.8,dur:0.35},{freq:1100,start:1.2,dur:0.45}];
  notes.forEach(({freq,start,dur}) => {
    const osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination); osc.type='sine';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime+start);
    gain.gain.setValueAtTime(0, audioCtx.currentTime+start);
    gain.gain.linearRampToValueAtTime(0.65, audioCtx.currentTime+start+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+start+dur);
    osc.start(audioCtx.currentTime+start); osc.stop(audioCtx.currentTime+start+dur+0.05);
  });
  setTimeout(()=>{onDone&&onDone();}, 1800);
}

// ── TTS ──
const synth = window.speechSynthesis;
let thVoice = null, voicesLoaded = false;
function loadVoices() {
  const v = synth ? synth.getVoices() : [];
  thVoice = v.find(x=>x.lang==='th-TH') || v.find(x=>x.lang&&x.lang.startsWith('th')) || v.find(x=>x.lang&&x.lang.startsWith('en')) || v[0] || null;
  voicesLoaded = v.length > 0;
}
if (synth) { loadVoices(); synth.onvoiceschanged = loadVoices; }

function speakText(text, onDone) {
  if (!synth) { onDone&&onDone(); return; }
  synth.cancel();
  setTimeout(() => {
    const utt = new SpeechSynthesisUtterance(text);
    if (!voicesLoaded) loadVoices();
    if (thVoice) utt.voice = thVoice;
    utt.lang = thVoice ? thVoice.lang : 'th-TH';
    utt.rate = 0.88; utt.pitch = 1.2; utt.volume = 1;
    utt.onend = () => { onDone&&onDone(); };
    utt.onerror = () => { onDone&&onDone(); };
    synth.speak(utt);
  }, 80);
}

// ── TTS text builder ──
const thDigits=['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
const thCharName={'ก':'กอ','ข':'ขอ','ค':'คอ','ง':'งอ','จ':'จอ','ฉ':'ฉอ','ช':'ชอ','ซ':'ซอ','ญ':'ญอ','ด':'ดอ','ต':'ตอ','ถ':'ถอ','ท':'ทอ','น':'นอ','บ':'บอ','ป':'ปอ','ผ':'ผอ','ฝ':'ฝอ','พ':'พอ','ฟ':'ฟอ','ภ':'ภอ','ม':'มอ','ย':'ยอ','ร':'รอ','ล':'ลอ','ว':'วอ','ส':'สอ','ห':'หอ','อ':'ออ','ฮ':'ฮอ','ฆ':'ฆอ','ณ':'ณอ','ธ':'ธอ','ฑ':'ฑอ','ฒ':'ฒอ','ศ':'ศอ','ษ':'ษอ','ฌ':'ฌอ','ฏ':'ฏอ','ฐ':'ฐอ','ฃ':'ฃอ','ฅ':'ฅอ'};
function charSpell(ch){return thCharName[ch]||ch;}
function numSpell(n){const d=parseInt(n,10);return isNaN(d)?'':thDigits[d]||n;}
const thTens=['','สิบ','ยี่สิบ','สามสิบ','สี่สิบ','ห้าสิบ','หกสิบ','เจ็ดสิบ','แปดสิบ','เก้าสิบ'];
function qNumThai(n){
  if(n<10)return thDigits[n];
  const tens=Math.floor(n/10),ones=n%10;
  return(tens===1?'สิบ':thTens[tens])+(ones===1?'เอ็ด':ones===0?'':thDigits[ones]);
}
function buildAnnounceText(q){
  const charWords=q.chars.filter(Boolean).map(ch=>charSpell(ch)+'ไ').join('  ');
  const numWords=q.nums.filter(Boolean).map(numSpell).join('  ');
  return `เชิญ คิวที่ ${qNumThai(q.num)} ทะเบียน ${charWords} ${numWords} จังหวัด ${q.province} รับรถได้ที่ ${q.zone}`;
}

// ── Full trigger: chime → speak → repeat ──
let callingAnim = null;
window._triggerCall = function(q) {
  const text = buildAnnounceText(q);
  // Flash background
  const panel = document.getElementById('calling-panel');
  panel.classList.remove('flash');
  void panel.offsetWidth;
  panel.classList.add('flash');
  // Animate plate + announce
  animatePlate(q);
  playChime(() => speakText(text, () => setTimeout(() => playChime(() => speakText(text)), 800)));
};

// ── Animate plate letter by letter ──
function animatePlate(q) {
  if (callingAnim) clearInterval(callingAnim);
  const panel = document.getElementById('calling-panel');
  const allChars = [...q.chars.filter(Boolean), ...q.nums.filter(Boolean)];
  let i = -1;
  panel.innerHTML = buildCallingHTML(q, -1);
  callingAnim = setInterval(() => {
    i++;
    if (i >= allChars.length) { clearInterval(callingAnim); panel.innerHTML = buildCallingHTML(q, allChars.length); return; }
    panel.innerHTML = buildCallingHTML(q, i);
  }, 500);
}

function buildCallingHTML(q, curIdx) {
  const allChars = [...q.chars.filter(Boolean), ...q.nums.filter(Boolean)];
  const letCount = q.chars.filter(Boolean).length;
  const isLet = idx => idx < letCount;
  let boxes = '';
  allChars.forEach((ch, idx) => {
    if (idx === letCount && letCount > 0) boxes += `<div class="plate-sep-big">–</div>`;
    let cls = 'pc';
    if (idx < curIdx)  cls += isLet(idx) ? ' lit-l' : ' lit-n';
    if (idx === curIdx) cls += ' cur ' + (isLet(idx) ? 'l' : 'n');
    boxes += `<div class="${cls}">${idx <= curIdx ? ch : ''}</div>`;
  });
  const isActive = curIdx >= 0;
  return `
    <div class="calling-tag ${isActive?'active':''}">📢 กรุณารับรถ</div>
    <div class="calling-num ${isActive?'active':''}">คิวที่ ${padNum(q.num)}</div>
    <div class="plate-wrap">${boxes}</div>
    <div class="zone-tag ${isActive?'active':''}">📍 ${q.zone}</div>
    <div class="province-tag">${q.province}</div>
  `;
}

window._showCallingStatic = function(q) {
  if (callingAnim) return; // don't override animation
  const panel = document.getElementById('calling-panel');
  if (!panel.querySelector('.calling-num')) panel.innerHTML = buildCallingHTML(q, 99);
};

window._showIdle = function() {
  if (callingAnim) { clearInterval(callingAnim); callingAnim = null; }
  document.getElementById('calling-panel').innerHTML = `
    <div class="idle-state">
      <div class="idle-icon">🚗</div>
      <div class="idle-text">รอการเรียกคิว...</div>
    </div>`;
};

// ── Queue panel ──
function padNum(n) { return String(n).padStart(2,'0'); }
window._renderQueuePanel = function(queues, callingId) {
  const waiting = queues.filter(x => x.status === 'waiting');
  const el = document.getElementById('qp-list');
  if (!waiting.length) { el.innerHTML = `<div style="text-align:center;padding:40px 0;font-size:13px;color:var(--text-muted)">ไม่มีคิวรอ</div>`; return; }
  el.innerHTML = queues.filter(x => x.status !== 'done').map(q => `
    <div class="qp-item ${q.id === callingId ? 'active' : ''}">
      <div class="qp-num">${padNum(q.num)}</div>
      <div class="qp-plate">
        ${q.chars.filter(Boolean).map(c=>`<span class="l">${c}</span>`).join('')}
        <span class="l">–</span>
        ${q.nums.filter(Boolean).map(n=>`<span class="n">${n}</span>`).join('')}
      </div>
      <div class="qp-zone">${q.zone}</div>
    </div>`).join('');
};
</script>
</body>
</html>
