<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าจอแสดงคิว</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3fa;--surface:#fff;--surface2:#ede9f8;--border:#ddd6f3;--accent:#7c4dff;--accent2:#6535e8;--gold:#c9a84c;--text:#1e1535;--text-dim:#5c4f80;--text-muted:#9b8ec4;--green:#22c55e;--shadow:0 2px 12px rgba(124,77,255,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 8px rgba(124,77,255,.08);position:relative;z-index:11}
.tlogo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:var(--text)}
.ticon{width:30px;height:30px;background:linear-gradient(135deg,#7c4dff,#a78bfa);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.tright{display:flex;align-items:center;gap:16px}
.clock-big{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;color:var(--text-dim);letter-spacing:2px}
.conn-pill{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 11px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted)}
.conn-dot.online{background:var(--green);box-shadow:0 0 7px rgba(34,197,94,.6);animation:pg 2s infinite}
@keyframes pg{0%,100%{box-shadow:0 0 7px rgba(34,197,94,.6)}50%{box-shadow:0 0 14px rgba(34,197,94,.9)}}
.conn-text{font-size:11px;color:var(--text-dim);font-weight:600}
.main{flex:1;display:flex;overflow:hidden;position:relative}

/* YT background */
#yt-wrap{position:absolute;inset:0;z-index:0;background:#000;transition:opacity .4s}
#yt-wrap.dimmed{opacity:.2}
#yt-frame{width:100%;height:100%;border:none}

/* queue overlay */
#qov{position:absolute;inset:0;z-index:5;display:flex;opacity:0;transition:opacity .35s;pointer-events:none}
#qov.visible{opacity:1;pointer-events:auto}
#qov::before{content:'';position:absolute;inset:0;background:rgba(245,243,250,.88);backdrop-filter:blur(4px)}
.ov-calling{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px}
.ov-calling::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 45%,rgba(124,77,255,.1) 0%,transparent 65%);pointer-events:none}
.ov-qlist{position:relative;width:280px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;box-shadow:-4px 0 20px rgba(124,77,255,.06)}
.oqhd{padding:14px 17px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted)}
.oqbody{flex:1;overflow-y:auto;padding:8px}
.oqi{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:6px}
.oqi.active{background:rgba(124,77,255,.1);border-color:rgba(124,77,255,.3)}
.oqnum{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--text-muted);min-width:30px}
.oqi.active .oqnum{color:var(--accent)}
.oqplate{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;letter-spacing:1.5px;flex:1}
.oqplate .l{color:var(--text)}.oqplate .n{color:var(--accent)}
.oqzone{font-size:10px;color:var(--text-muted);background:var(--surface);border-radius:4px;padding:2px 6px;white-space:nowrap;border:1px solid var(--border)}

/* idle state (visible when no queue) */
#idle-state{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted)}
#idle-state.hidden{display:none}
.idle-icon{font-size:64px;opacity:.2;margin-bottom:14px}
.idle-text{font-size:16px;font-weight:500}

/* calling display */
.clab{font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:18px}
.clab.active{color:var(--accent)}
.cnum{font-family:'IBM Plex Mono',monospace;font-size:clamp(52px,9vw,100px);font-weight:700;color:var(--text-muted);margin-bottom:4px;line-height:1}
.cnum.active{color:var(--accent)}
.cplates{display:flex;align-items:center;gap:7px;margin:14px 0 18px;flex-wrap:wrap;justify-content:center}
.cpc{font-family:'IBM Plex Mono',monospace;font-size:clamp(38px,6.5vw,72px);font-weight:700;width:clamp(46px,6.5vw,80px);height:clamp(58px,8.5vw,100px);display:flex;align-items:center;justify-content:center;background:var(--surface);border:2px solid var(--border);border-radius:12px;color:var(--text-muted);transition:all .3s;box-shadow:var(--shadow)}
.cpc.ll{color:var(--text);border-color:#c4b5fd}
.cpc.ln{color:var(--accent);border-color:#c4b5fd}
.cpc.cur{transform:scale(1.1);box-shadow:0 0 0 3px rgba(124,77,255,.3),0 8px 28px rgba(124,77,255,.2);border-color:var(--accent)}
.cpc.cur.l,.cpc.cur.n{color:var(--accent2)}
.czone{font-size:clamp(15px,2.5vw,24px);font-weight:700;color:var(--text-dim);margin-bottom:8px;padding:8px 26px;background:var(--surface);border:2px solid var(--border);border-radius:10px;box-shadow:var(--shadow)}
.czone.active{border-color:var(--accent);color:var(--accent);background:rgba(124,77,255,.06)}
.cprov{font-size:13px;color:var(--text-muted)}

/* YT bar */
#yt-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(245,243,250,.95);border-top:1px solid var(--border);padding:10px 18px;display:flex;gap:9px;align-items:center;transform:translateY(100%);transition:transform .3s;backdrop-filter:blur(8px)}
#yt-bar.show{transform:translateY(0)}
#yti{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;padding:8px 12px;outline:none;font-family:'Sarabun',sans-serif}
#yti:focus{border-color:var(--accent)}
.yb{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer}
.yb.sec{background:var(--surface2);color:var(--text-dim);border:1px solid var(--border)}
#ytgear{position:fixed;bottom:14px;right:14px;z-index:15;background:var(--surface);border:1.5px solid var(--border);border-radius:50%;width:40px;height:40px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);opacity:.5;box-shadow:var(--shadow);transition:opacity .2s}
#ytgear:hover{opacity:1}

/* unlock */
.unlock{position:fixed;inset:0;background:rgba(245,243,250,.98);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:18px}
.unlock.hidden{display:none}
.unlock-icon{font-size:68px}
.unlock-text{font-size:20px;font-weight:700;color:var(--text-dim)}
.unlock-sub{font-size:13px;color:var(--text-muted)}
.unlock-btn{margin-top:10px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px 40px;font-size:17px;font-weight:700;font-family:'Sarabun',sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(124,77,255,.3)}
</style>
</head>
<body>

<div class="unlock" id="uov" onclick="unlockStart()">
  <div class="unlock-icon">🔔</div>
  <div class="unlock-text">หน้าจอแสดงคิวรับรถ</div>
  <div class="unlock-sub">แตะหน้าจอเพื่อเริ่มรับสัญญาณ</div>
  <button class="unlock-btn">▶ เริ่มใช้งาน</button>
</div>

<div class="topbar">
  <div class="tlogo"><div class="ticon">📺</div>ระบบแสดงคิวรับรถ — สถานตรวจสภาพ</div>
  <div class="tright">
    <div class="conn-pill"><div class="conn-dot" id="cdot"></div><span class="conn-text" id="clab">กำลังเชื่อมต่อ...</span></div>
    <div class="clock-big" id="clock">--:--:--</div>
  </div>
</div>

<div class="main">
  <div id="yt-wrap"><iframe id="yt-frame" src="about:blank" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>
  <div id="idle-state"><div class="idle-icon">🚗</div><div class="idle-text">รอการเรียกคิว...</div></div>
  <div id="qov">
    <div class="ov-calling" id="cpanel"><div class="idle-icon">🔔</div></div>
    <div class="ov-qlist">
      <div class="oqhd">คิวรอเรียก</div>
      <div class="oqbody" id="oqbody"><div style="text-align:center;padding:30px 0;font-size:12px;color:var(--text-muted)">ไม่มีคิว</div></div>
    </div>
  </div>
</div>

<div id="yt-bar">
  <span style="font-size:12px;color:var(--text-muted);white-space:nowrap">🎬 YouTube URL</span>
  <input type="text" id="yti" placeholder="วาง YouTube URL ที่นี่">
  <button class="yb" onclick="loadYT()">โหลด</button>
  <button class="yb sec" onclick="toggleYTBar()">ปิด</button>
</div>
<div id="ytgear" onclick="toggleYTBar()">⚙️</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const cfg={apiKey:"AIzaSyCFc9wLwD0J9_GcXnJ2xzAVMjnPhVJmwqM",authDomain:"create-98245.firebaseapp.com",databaseURL:"https://create-98245-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"create-98245",storageBucket:"create-98245.firebasestorage.app",messagingSenderId:"490139130684",appId:"1:490139130684:web:a69bfbcb7e61dda952dc39"};
const app=initializeApp(cfg),db=getDatabase(app);
onValue(ref(db,'.info/connected'),s=>{const on=s.val()===true;document.getElementById('cdot').className='conn-dot'+(on?' online':'');document.getElementById('clab').textContent=on?'เชื่อมต่อแล้ว':'กำลังเชื่อมต่อ...';});
let lastCal=null;
onValue(ref(db,'queue_system'),snap=>{
  const d=snap.val();if(!d)return;
  const{queues=[],calling=null}=d;
  window._rQP(queues,calling);

  // show overlay if there are passed/calling queues
  const hasPassed=queues.some(x=>x.status==='passed'||x.status==='calling');

  if(calling&&calling!==lastCal){
    const q=queues.find(x=>x.id===calling);
    if(q&&window._aReady)window._trigger(q);
    lastCal=calling;
  } else if(!calling){lastCal=null;}

  if(calling){
    const q=queues.find(x=>x.id===calling);
    if(q)window._showStatic(q);
  } else if(hasPassed){
    // แสดง overlay รายการรอ แต่ไม่แสดงคิวกำลังเรียก
    window._showWaiting();
  } else {
    window._showIdle();
  }
});
</script>
<script>
let actx=null,aReady=false;window._aReady=false;
function unlockStart(){
  try{actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();aReady=true;window._aReady=true;}catch(e){}
  document.getElementById('uov').classList.add('hidden');
}
setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false}),1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour12:false});

// YT
function extractVid(url){const m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function toggleYTBar(){document.getElementById('yt-bar').classList.toggle('show');}
function loadYT(){const url=document.getElementById('yti').value.trim(),vid=extractVid(url);if(!vid){alert('URL ไม่ถูกต้อง');return;}document.getElementById('yt-frame').src=`https://www.youtube.com/embed/${vid}?autoplay=1&enablejsapi=1&loop=1&playlist=${vid}&controls=1`;document.getElementById('yt-bar').classList.remove('show');}
function pauseYT(){document.getElementById('yt-frame').contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}','*');}
function playYT(){document.getElementById('yt-frame').contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}','*');}

// CHIME
function playChime(cb){
  if(!actx){cb&&cb();return;}if(actx.state==='suspended')actx.resume();
  [{f:880,s:0,d:.35},{f:660,s:.4,d:.35},{f:880,s:.8,d:.35},{f:1100,s:1.2,d:.45}].forEach(({f,s,d})=>{
    const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type='sine';
    o.frequency.setValueAtTime(f,actx.currentTime+s);g.gain.setValueAtTime(0,actx.currentTime+s);
    g.gain.linearRampToValueAtTime(.65,actx.currentTime+s+.02);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+s+d);
    o.start(actx.currentTime+s);o.stop(actx.currentTime+s+d+.05);
  });
  setTimeout(()=>{cb&&cb();},1800);
}
const syn=window.speechSynthesis;let thV=null,vL=false;
function lV(){const v=syn?syn.getVoices():[];thV=v.find(x=>x.lang==='th-TH')||v.find(x=>x.lang?.startsWith('th'))||v.find(x=>x.lang?.startsWith('en'))||v[0]||null;vL=v.length>0;}
if(syn){lV();syn.onvoiceschanged=lV;}
function spk(text,cb,rate=0.82){
  if(!syn){cb&&cb();return;}syn.cancel();
  setTimeout(()=>{const u=new SpeechSynthesisUtterance(text);if(!vL)lV();if(thV)u.voice=thV;u.lang=thV?thV.lang:'th-TH';u.rate=rate;u.pitch=1.2;u.volume=1;u.onend=()=>{cb&&cb();};u.onerror=()=>{cb&&cb();};syn.speak(u);},80);
}
const thD=['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า'];
const thC={'ก':'กอ','ข':'ขอ','ค':'คอ','ง':'งอ','จ':'จอ','ฉ':'ฉอ','ช':'ชอ','ซ':'ซอ','ญ':'ญอ','ด':'ดอ','ต':'ตอ','ถ':'ถอ','ท':'ทอ','น':'นอ','บ':'บอ','ป':'ปอ','ผ':'ผอ','ฝ':'ฝอ','พ':'พอ','ฟ':'ฟอ','ภ':'ภอ','ม':'มอ','ย':'ยอ','ร':'รอ','ล':'ลอ','ว':'วอ','ส':'สอ','ห':'หอ','อ':'ออ','ฮ':'ฮอ','ฆ':'ฆอ','ณ':'ณอ','ธ':'ธอ','ฑ':'ฑอ','ฒ':'ฒอ','ศ':'ศอ','ษ':'ษอ','ฌ':'ฌอ','ฏ':'ฏอ','ฐ':'ฐอ'};
function cSp(c){return thC[c]||c;}function nSp(n){const d=parseInt(n);return isNaN(d)?'':thD[d]||n;}
const thT=['','สิบ','ยี่สิบ','สามสิบ','สี่สิบ','ห้าสิบ','หกสิบ','เจ็ดสิบ','แปดสิบ','เก้าสิบ'];
function qTh(n){if(n<10)return thD[n];const t=Math.floor(n/10),o=n%10;return(t===1?'สิบ':thT[t])+(o===1?'เอ็ด':o===0?'':thD[o]);}
function ann(q,done){
  const cw=q.chars.filter(Boolean).map(cSp).join('   '),nw=q.nums.filter(Boolean).map(nSp).join('   ');
  spk(`เชิญ คิวที่ ${qTh(q.num)}`,()=>setTimeout(()=>spk(`ทะเบียน ${cw}   ${nw}`,()=>setTimeout(()=>spk(`จังหวัด ${q.province}   รับรถได้ที่ ${q.zone}`,()=>{done&&done();},0.82),250),0.58),150),0.82);
}
const p2=n=>String(n).padStart(2,'0');
let calAnim=null;
window._trigger=function(q){
  document.getElementById('yt-wrap').classList.add('dimmed');pauseYT();
  document.getElementById('idle-state').classList.add('hidden');
  document.getElementById('qov').classList.add('visible');
  animPlate(q);
  playChime(()=>ann(q,()=>setTimeout(()=>playChime(()=>ann(q,()=>setTimeout(()=>{document.getElementById('yt-wrap').classList.remove('dimmed');playYT();},800))),600)));
};
function animPlate(q){
  if(calAnim)clearInterval(calAnim);
  const cp=document.getElementById('cpanel'),all=[...q.chars.filter(Boolean),...q.nums.filter(Boolean)];
  let i=-1;cp.innerHTML=buildCH(q,-1);
  calAnim=setInterval(()=>{i++;if(i>=all.length){clearInterval(calAnim);calAnim=null;cp.innerHTML=buildCH(q,all.length);return;}cp.innerHTML=buildCH(q,i);},600);
}
function buildCH(q,ci){
  const all=[...q.chars.filter(Boolean),...q.nums.filter(Boolean)],lc=q.chars.filter(Boolean).length,isL=i=>i<lc;
  let boxes='';
  all.forEach((ch,i)=>{
    if(i===lc&&lc>0)boxes+=`<div style="font-family:'IBM Plex Mono';font-size:clamp(30px,5vw,54px);color:var(--text-muted);padding:0 5px">–</div>`;
    let cls='cpc';if(i<ci)cls+=isL(i)?' ll':' ln';if(i===ci)cls+=' cur '+(isL(i)?'l':'n');
    boxes+=`<div class="${cls}">${i<=ci?ch:''}</div>`;
  });
  const active=ci>=0;
  return `<div class="clab${active?' active':''}">📢 กรุณารับรถ</div>
    <div class="cnum${active?' active':''}">คิวที่ ${p2(q.num)}</div>
    <div class="cplates">${boxes}</div>
    <div class="czone${active?' active':''}">📍 ${q.zone}</div>
    <div class="cprov">${q.province}</div>`;
}
window._showWaiting=function(){
  if(calAnim){clearInterval(calAnim);calAnim=null;}
  document.getElementById('idle-state').classList.add('hidden');
  document.getElementById('qov').classList.add('visible');
  document.getElementById('cpanel').innerHTML=`
    <div class="clab">รายการรอเรียก</div>
    <div style="font-size:clamp(40px,7vw,80px);opacity:.15;margin:16px 0">🚗</div>
    <div style="font-size:16px;color:var(--text-muted);font-weight:500">รอพนักงานเรียกคิว</div>`;
};
window._showStatic=function(q){
  if(calAnim)return;
  document.getElementById('idle-state').classList.add('hidden');
  document.getElementById('qov').classList.add('visible');
  const cp=document.getElementById('cpanel');
  if(!cp.querySelector('.cnum'))cp.innerHTML=buildCH(q,99);
};
window._showIdle=function(){
  if(calAnim){clearInterval(calAnim);calAnim=null;}
  document.getElementById('qov').classList.remove('visible');
  document.getElementById('idle-state').classList.remove('hidden');
  document.getElementById('yt-wrap').classList.remove('dimmed');
  playYT();
};
window._rQP=function(queues,calId){
  const active=queues.filter(x=>x.status==='passed'||x.status==='calling');
  const el=document.getElementById('oqbody');
  if(!active.length){el.innerHTML=`<div style="text-align:center;padding:30px 0;font-size:12px;color:var(--text-muted)">ไม่มีคิวรอ</div>`;return;}
  el.innerHTML=active.map(q=>`
    <div class="oqi${q.id===calId?' active':''}">
      <div class="oqnum">${p2(q.num)}</div>
      <div class="oqplate">${q.chars.filter(Boolean).map(c=>`<span class="l">${c}</span>`).join('')}<span class="l">–</span>${q.nums.filter(Boolean).map(n=>`<span class="n">${n}</span>`).join('')}</div>
      <div class="oqzone">${q.zone}</div>
    </div>`).join('');
};
</script>
</body>
</html>
