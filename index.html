<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบเรียกคิวรับรถ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background:#eef1f5; margin:0 }
.container { max-width:1000px; margin:auto; padding:20px }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px }
h2 { margin:0 0 10px }
input,button { padding:10px; margin:5px 0; border-radius:6px; border:1px solid #ccc }
button { background:#1f4e79; color:#fff; cursor:pointer }
table { width:100%; border-collapse:collapse; margin-top:10px }
th,td { padding:10px; border-bottom:1px solid #ddd; text-align:center }
.big { font-size:60px; font-weight:bold; text-align:center }
.tv { position:fixed; inset:0; background:#000; color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center }
.tv .big { font-size:140px }
.hidden { display:none }
</style>
</head>

<body>

<div id="admin" class="container">
  <div class="card">
    <h2>เพิ่มคิว</h2>
    <input id="plate" placeholder="ทะเบียน">
    <input id="province" placeholder="จังหวัด">
    <input id="counter" placeholder="จุดรับรถ">
    <button onclick="addQueue()">เพิ่มคิว</button>
  </div>

  <div class="card">
    <h2>คิวปัจจุบัน</h2>
    <div class="big" id="current">--</div>
    <button onclick="callNext()">เรียกคิวถัดไป</button>
  </div>

  <div class="card">
    <h2>รายการคิว</h2>
    <table>
      <thead>
        <tr>
          <th>คิว</th><th>ทะเบียน</th><th>จังหวัด</th><th>จุด</th><th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="list"></tbody>
    </table>
  </div>
</div>

<div id="tv" class="tv hidden">
  <div class="big" id="tvNumber">--</div>
  <div id="tvPlate"></div>
  <div id="tvProvince"></div>
  <div id="tvCounter"></div>
</div>

<script>
const isTV = location.search.includes("screen=tv");
document.getElementById("admin").classList.toggle("hidden", isTV);
document.getElementById("tv").classList.toggle("hidden", !isTV);

let queue = [];
let currentIndex = -1;

// 🔊 เสียงแบบห้าง (ไม่มีสแลช)
function speakWords(arr){
  if(!arr.length) return;
  const msg = new SpeechSynthesisUtterance(arr[0]);
  msg.lang = "th-TH";
  msg.rate = 0.9;
  msg.onend = ()=> speakWords(arr.slice(1));
  speechSynthesis.speak(msg);
}

function plateToSpeech(text){
  const map = {
    '0':'ศูนย์','1':'หนึ่ง','2':'สอง','3':'สาม','4':'สี่',
    '5':'ห้า','6':'หก','7':'เจ็ด','8':'แปด','9':'เก้า'
  };
  return text.replace(/[^ก-ฮ0-9]/g,'').split('').map(c => map[c] || c);
}

function speakQueue(q){
  speechSynthesis.cancel();
  const words = [
    "ขอเชิญลูกค้ารับรถ",
    "คิว "+q.number,
    "ทะเบียน",
    ...plateToSpeech(q.plate),
    "จังหวัด "+q.province,
    "ที่จุดรับรถ "+q.counter
  ];
  speakWords(words);
}

// ➕ เพิ่มคิว
function addQueue(){
  const plate = document.getElementById("plate").value;
  const province = document.getElementById("province").value;
  const counter = document.getElementById("counter").value;

  const num = String(queue.length+1).padStart(2,'0');

  queue.push({number:num,plate,province,counter});
  render();
}

// ▶️ เรียกคิว
function callNext(){
  currentIndex++;
  if(currentIndex>=queue.length) return alert("ไม่มีคิว");

  const q = queue[currentIndex];

  document.getElementById("current").innerText = q.number;
  document.getElementById("tvNumber").innerText = q.number;
  document.getElementById("tvPlate").innerText = q.plate;
  document.getElementById("tvProvince").innerText = q.province;
  document.getElementById("tvCounter").innerText = q.counter;

  speakQueue(q);
}

// ✏️ แก้ไขคิว
function editQueue(i){
  const q = queue[i];
  const plate = prompt("ทะเบียน", q.plate);
  const province = prompt("จังหวัด", q.province);
  const counter = prompt("จุดรับรถ", q.counter);

  if(plate) q.plate = plate;
  if(province) q.province = province;
  if(counter) q.counter = counter;

  render();
}

// 🧾 render ตาราง
function render(){
  const tbody = document.getElementById("list");
  tbody.innerHTML = "";
  queue.forEach((q,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${q.number}</td>
        <td>${q.plate}</td>
        <td>${q.province}</td>
        <td>${q.counter}</td>
        <td><button onclick="editQueue(${i})">แก้ไข</button></td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
