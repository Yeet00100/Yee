<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบเรียกคิวรับรถ</title>
<style>
body {
  font-family: sans-serif;
  background: #f5f6f8;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
}
.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
}
input, button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
button {
  background: #0d6efd;
  color: white;
  font-weight: bold;
}
.current {
  text-align: center;
  font-size: 28px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h3>เพิ่มคิว</h3>
    <input id="plate" placeholder="ทะเบียน เช่น กข1234">
    <input id="province" placeholder="จังหวัด">
    <input id="counter" placeholder="จุดรับรถ">
    <button onclick="addQueue()">เพิ่มคิว</button>
  </div>

  <div class="card current">
    <div>กำลังเรียก</div>
    <div id="currentQueue">-</div>
  </div>

  <div class="card">
    <button onclick="callNext()">เรียกคิวถัดไป</button>
  </div>

</div>

<script>

let queue = [];
let currentIndex = -1;

// 🔊 แปลงทะเบียนแบบห้าง
function formatPlateForSpeech(text) {
  const thaiMap = {
    'ก': 'กอ ไก่','ข': 'ขอ ไข่','ค': 'คอ ควาย','ง': 'งอ งู',
    'จ': 'จอ จาน','ฉ': 'ฉอ ฉิ่ง','ช': 'ชอ ช้าง','ซ': 'ซอ โซ่',
    'ด': 'ดอ เด็ก','ต': 'ตอ เต่า','ถ': 'ถอ ถุง','ท': 'ทอ ทหาร',
    'น': 'นอ หนู','บ': 'บอ ใบไม้','ป': 'ปอ ปลา','ผ': 'ผอ ผึ้ง',
    'ฝ': 'ฝอ ฝา','พ': 'พอ พาน','ฟ': 'ฟอ ฟัน','ม': 'มอ ม้า',
    'ย': 'ยอ ยักษ์','ร': 'รอ เรือ','ล': 'ลอ ลิง','ว': 'วอ แหวน',
    'ส': 'สอ เสือ','ห': 'หอ หีบ','อ': 'ออ อ่าง','ฮ': 'ฮอ นกฮูก'
  };

  const numberMap = {
    '0':'ศูนย์','1':'หนึ่ง','2':'สอง','3':'สาม','4':'สี่',
    '5':'ห้า','6':'หก','7':'เจ็ด','8':'แปด','9':'เก้า'
  };

  return (text || '')
    .replace(/[^ก-ฮ0-9]/g,'')
    .split('')
    .map(c => thaiMap[c] || numberMap[c] || '')
    .join(' ');
}

// 🔊 เสียงแบบห้าง
function speakQueue(q, plate, province, counter) {
  const plateSpeech = formatPlateForSpeech(plate);

  const text = `
ขอเชิญลูกค้ารับรถ
คิว ${q}
ทะเบียน ${plateSpeech}
จังหวัด ${province}
ที่จุดรับรถ ${counter}
`;

  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "th-TH";
  msg.rate = 0.85;

  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

// ➕ เพิ่มคิว
function addQueue() {
  const plate = document.getElementById("plate").value;
  const province = document.getElementById("province").value;
  const counter = document.getElementById("counter").value;

  const qNumber = String(queue.length + 1).padStart(2, '0');

  queue.push({
    number: qNumber,
    plate,
    province,
    counter
  });

  alert("เพิ่มคิว " + qNumber + " เรียบร้อย");
}

// ▶️ เรียกคิว
function callNext() {
  currentIndex++;

  if (currentIndex >= queue.length) {
    alert("ไม่มีคิวแล้ว");
    return;
  }

  const q = queue[currentIndex];

  document.getElementById("currentQueue").innerText = q.number;

  speakQueue(q.number, q.plate, q.province, q.counter);
}

</script>

</body>
</html>
